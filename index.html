<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Love 💌</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ff9eb5,#ffc0cb);
  font-family:sans-serif;
  overflow:hidden;
}

.container{
  position:relative;
  text-align:center;
}

/* ENVELOPE */
.envelope{
  width:260px;
  height:160px;
  background:#ff6f91;
  border-radius:10px;
  cursor:pointer;
  position:relative;
}

.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:#ff8fab;
  clip-path: polygon(0 0,50% 50%,100% 0);
  transform-origin:top;
  transition:0.6s;
}

.bodyText{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-weight:bold;
}

/* LETTER */
.letter{
  display:none;
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:20px;
  border-radius:10px;
  width:250px;
}

button{
  margin:10px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.yes{
  background:#ff4d6d;
  color:white;
}

.no{
  position:absolute;
  background:white;
  border:2px solid #ff4d6d;
  color:#ff4d6d;
}

/* RESULT */
.result{
  display:none;
  position:absolute;
  top:180px;
  left:50%;
  transform:translateX(-50%);
  width:260px;
  background:white;
  padding:20px;
  border-radius:10px;
}

/* TYPING */
#text{
  border-right:2px solid black;
  white-space:pre-line;
}

/* HEARTS */
.heart{
  position:absolute;
  color:red;
  animation:float 4s linear infinite;
}

@keyframes float{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-600px);opacity:0;}
}
</style>

</head>
<body>

<div class="container">

  <!-- ENVELOPE -->
  <div class="envelope" onclick="openEnvelope()">
    <div class="flap" id="flap"></div>
    <div class="bodyText">To. Rayyona ❤️</div>
  </div>

  <!-- LETTER -->
  <div class="letter" id="letter">
    <h3>Bu xatni oxirigacha o‘qishga vada berasanmi?</h3>
    <button class="yes" onclick="showLove()">Yes ❤️</button>
    <button class="no" id="noBtn">No 😢</button>
  </div>

  <!-- RESULT -->
  <div class="result" id="result">
    <p id="text"></p>
  </div>

</div>

<script>
function openEnvelope(){
  document.getElementById("flap").style.transform="rotateX(180deg)";
  document.getElementById("letter").style.display="block";
}

// NO qochadi
const noBtn=document.getElementById("noBtn");

noBtn.addEventListener("mouseover",()=>{
  const x=Math.random()*300-150;
  const y=Math.random()*200-100;
  noBtn.style.transform=translate(${x}px,${y}px);
});

// YES bosilganda
function showLove(){
  document.getElementById("letter").style.display="none";
  document.getElementById("result").style.display="block";

  const message = Hayotim... ❤️

Bilmayman bu xatni o‘qigach nima deysan...
Lekin bil, har bir so‘zim chin yurakdan.

Sen mening eng katta baxtimsan 💖
Sening tabassuming — kunimning eng yorug‘ nuri.

Seni chin yuragim bilan sevaman ❤️;

  typeEffect(message);
  createHearts();
}

// typing effect
function typeEffect(text){
  let i=0;
  const speed=40;
  const el=document.getElementById("text");

  function typing(){
    if(i<text.length){
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing,speed);
    }
  }
  typing();
}

// hearts animation
function createHearts(){
  setInterval(()=>{
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(Math.random()*20+10)+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{
      heart.remove();
    },4000);

  },300);
}
</script>

</body>
</html>
