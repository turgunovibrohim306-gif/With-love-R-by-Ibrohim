<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#0d0d1a;
font-family:sans-serif;
overflow:hidden;
color:white;
}

/* ENVELOPE */
.envelope{
width:220px;
height:140px;
background:#ff4d6d;
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
cursor:pointer;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

/* BOX */
.box{
display:none;
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:15px;
text-align:center;
margin-top:20px;
}

/* RESULT */
.result{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:450px;
height:70%;
overflow:auto;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
}

/* BUTTON */
button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
}
.ha{background:#ff4d6d;color:white;}
.yoq{background:#333;color:white;position:absolute;}

/* TEXT */
#text{
line-height:1.6;
font-size:17px;
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<div class="envelope" onclick="openLetter()">💌 OPEN</div>

<div class="box" id="box">
<p>Oxirigacha o‘qiysanmi? ❤️</p>
<button class="ha" onclick="yes()">Ha ❤️</button>
<button class="yoq" id="yoq">Yoq 💔</button>
</div>

<div class="result" id="result">
<p id="text"></p>
</div>

<script>

/* MUSIC FIX (ENG MUHIM) */
function playMusic(){
let m=document.getElementById("music");
m.currentTime = 0;
m.play().catch(()=>{});
}

/* OPEN */
function openLetter(){
playMusic(); // 🔥 shu ishlaydi
document.getElementById("box").style.display="block";
document.querySelector(".envelope").style.display="none";
}

/* YOQ qochadi */
let yoq=document.getElementById("yoq");
yoq.onmouseover=function(){
yoq.style.left=Math.random()*300+"px";
yoq.style.top=Math.random()*200+"px";
}

/* YES */
function yes(){
document.getElementById("box").style.display="none";
document.getElementById("result").style.display="block";

let msg = `Hayotim...

Men seni yo‘qotishni istamayman.
Men hali ham bizga ishonaman... ❤️`;

type(msg);
}

/* TYPE */
function type(t){
let i=0;
let el=document.getElementById("text");
function write(){
if(i<t.length){
el.innerHTML+=t[i];
i++;
setTimeout(write,15);
}
}
write();
}

</script>

</body>
</html>
