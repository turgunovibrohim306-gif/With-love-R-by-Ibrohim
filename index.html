<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Love 💌</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9eb5,#ffc0cb);
font-family:sans-serif;
overflow:hidden;
}

.container{text-align:center;position:relative;}

.envelope{
width:220px;
height:130px;
background:#ff4d6d;
position:relative;
cursor:pointer;
border-radius:10px;
}

.flap{
position:absolute;
width:100%;
height:100%;
background:#ff758f;
clip-path: polygon(0 0,50% 50%,100% 0);
transition:0.5s;
}

.letter{
display:none;
position:absolute;
top:150px;
left:50%;
transform:translateX(-50%);
background:white;
padding:20px;
border-radius:10px;
width:250px;
}

button{
margin:10px;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.yes{background:#ff4d6d;color:white;}
.no{position:absolute;}

.result{
display:none;
position:absolute;
top:150px;
left:50%;
transform:translateX(-50%);
background:white;
padding:20px;
border-radius:10px;
width:260px;
}

#text{
border-right:2px solid black;
white-space:pre-line;
}

.heart{
position:absolute;
animation:float 4s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-500px);opacity:0;}
}
</style>
</head>

<body>

<div class="container">

<div class="envelope" id="env">
<div class="flap" id="flap"></div>
</div>

<div class="letter" id="letter">
<h3>Bu xatni oxirigacha o‘qishga vada berasanmi?</h3>
<button class="yes" onclick="showLove()">Yes ❤️</button>
<button class="no" id="noBtn">No 😅</button>
</div>

<div class="result" id="result">
<p id="text"></p>
</div>

</div>

<script>

// open envelope
document.getElementById("env").onclick = function(){
document.getElementById("flap").style.transform="rotateX(180deg)";
document.getElementById("letter").style.display="block";
}

// no button qochadi
const noBtn=document.getElementById("noBtn");
noBtn.addEventListener("mouseover",()=>{
noBtn.style.left=Math.random()*200+"px";
noBtn.style.top=Math.random()*100+"px";
});

// yes bosilganda
function showLove(){
document.getElementById("letter").style.display="none";
document.getElementById("result").style.display="block";

const msg = Hayotim ❤️

Sen mening eng katta baxtimsan...
Har bir kulishing yuragimni isitadi 💖

Seni juda qattiq sevaman ❤️;

typeText(msg);
hearts();
}

// typing effect
function typeText(text){
let i=0;
const el=document.getElementById("text");

function typing(){
if(i<text.length){
el.innerHTML+=text.charAt(i);
i++;
setTimeout(typing,40);
}
}
typing();
}

// hearts
function hearts(){
setInterval(()=>{
const h=document.createElement("div");
h.innerHTML="❤️";
h.className="heart";

h.style.left=Math.random()*100+"vw";
h.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(h);

setTimeout(()=>h.remove(),4000);
},300);
}

</script>

</body>
</html>
