<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Love 💌</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:pink;
}

.envelope{
width:200px;
height:120px;
background:red;
position:relative;
cursor:pointer;
}

.flap{
position:absolute;
width:100%;
height:100%;
background:#ff7b9c;
clip-path: polygon(0 0,50% 50%,100% 0);
transition:0.5s;
}

.letter{
display:none;
position:absolute;
top:150px;
background:white;
padding:20px;
}
</style>
</head>

<body>

<div class="envelope" id="env">
  <div class="flap" id="flap"></div>
</div>

<div class="letter" id="letter">
  <h3>Salom ❤️ ishladi!</h3>
</div>

<script>
document.getElementById("env").addEventListener("click", function(){
  document.getElementById("flap").style.transform="rotateX(180deg)";
  document.getElementById("letter").style.display="block";
});
</script>

</body>
</html>
