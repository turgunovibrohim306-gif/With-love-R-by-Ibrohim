<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9eb5,#ffc0cb);
font-family:sans-serif;
overflow:hidden;
}

.envelope{
width:220px;
height:140px;
background:#ff4d6d;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:20px;
cursor:pointer;
border-radius:10px;
}

.box{
display:none;
position:absolute;
top:200px;
background:white;
padding:20px;
border-radius:12px;
width:300px;
text-align:center;
}

.no{
position:absolute;
}

.result{
display:none;
position:absolute;
top:180px;
background:white;
padding:20px;
border-radius:12px;
width:320px;
height:300px;
overflow:auto;
}

#text{
white-space:pre-line;
}

.heart{
position:absolute;
animation:float 4s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-500px);}
}
</style>
</head>

<body>

<div class="envelope" onclick="openLetter()">💌 OPEN</div>

<div class="box" id="box">
<p>Bu xatni oxirigacha o‘qishga va’da berasanmi?</p>
<button onclick="yes()">Yes ❤️</button>
<button class="no" id="no">No 😅</button>
</div>

<div class="result" id="result">
<p id="text"></p>
</div>

<script>

function openLetter(){
document.getElementById("box").style.display="block";
}

let no=document.getElementById("no");
no.onmouseover=function(){
no.style.left=Math.random()*200+"px";
no.style.top=Math.random()*150+"px";
}

function yes(){
document.getElementById("box").style.display="none";
document.getElementById("result").style.display="block";

let msg = `Hayotim...

Bilmayman bu xatni o‘qigach nima deb o‘ylaysan. Balki jahling hali ham bosilmagandir...

Men seni yo‘qotishdan qo‘rqyapman.

Sensiz hayotimda nimadir yetishmaydi...

Men mukammal emasman... lekin seni chin yuragimdan sevaman ❤️

Iltimos yana bir imkon ber...

Men hali ham bizga ishonaman ❤️`;

type(msg);
hearts();
}

function type(t){
let i=0;
let el=document.getElementById("text");

function write(){
if(i<t.length){
el.innerHTML+=t[i];
i++;
setTimeout(write,25);
}
}
write();
}

function hearts(){
setInterval(()=>{
let h=document.createElement("div");
h.innerHTML="❤️";
h.className="heart";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(Math.random()*20+10)+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),4000);
},300);
}

</script>

</body>
</html>
