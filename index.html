<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Love 💌</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:pink;
font-family:sans-serif;
overflow:hidden;
}

.envelope{
width:220px;
height:140px;
background:#ff4d6d;
position:relative;
cursor:pointer;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-weight:bold;
}

.letter{
display:none;
position:absolute;
top:200px;
background:white;
padding:20px;
border-radius:10px;
width:260px;
text-align:center;
}

button{
margin:10px;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.no{
position:absolute;
}

.result{
display:none;
position:absolute;
top:200px;
background:white;
padding:20px;
border-radius:10px;
width:260px;
}

.heart{
position:absolute;
animation:float 4s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-400px);}
}
</style>
</head>

<body>

<div class="envelope" id="env">💌 OPEN</div>

<div class="letter" id="letter">
<p>Oxirigacha o‘qishga va’da berasanmi?</p>
<button onclick="yes()">Yes ❤️</button>
<button class="no" id="noBtn">No 😅</button>
</div>

<div class="result" id="result">
<p id="text"></p>
</div>

<script>

// KONVERT BOSILGANDA
document.getElementById("env").onclick = function(){
document.getElementById("letter").style.display="block";
};

// NO QOCHADI
let no = document.getElementById("noBtn");
no.onmouseover = function(){
no.style.left = Math.random()*200 + "px";
no.style.top = Math.random()*100 + "px";
};

// YES BOSILSA
function yes(){
document.getElementById("letter").style.display="none";
document.getElementById("result").style.display="block";

let text = "Hayotim ❤️\n\nSeni juda qattiq sevaman 💖";
type(text);
hearts();
}

// TYPING
function type(t){
let i=0;
let el=document.getElementById("text");

function write(){
if(i<t.length){
el.innerHTML += t[i];
i++;
setTimeout(write,30);
}
}
write();
}

// HEART
function hearts(){
setInterval(()=>{
let h=document.createElement("div");
h.innerHTML="❤️";
h.className="heart";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),4000);
},300);
}

</script>

</body>
</html>
